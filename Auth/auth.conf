# Apply auth on site

server {
   listen 80;
   server_name dev.tanujsharma.me;

   root /var/www/development;
   index index.html;

   auth_basic "Under development site";
   auth_basic_user_file /etc/nginx/.htpasswd;

   location / {
      try_files $uri $uri/ =404;
   }

   location /status {
      basic_auth off;
   }

}